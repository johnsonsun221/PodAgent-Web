<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodAgent — AI 幫你聽完</title>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #ccff00;
      --accent-dim: rgba(204,255,0,0.12);
      --text: #ffffff;
      --muted: #888;
      --purple: #9b9bff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Layout ── */
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 680px;
      padding: 48px 24px 80px;
      flex-direction: column;
      animation: fadeIn .25s ease;
      position: relative;
      z-index: 1;
    }
    .screen.active { display: flex; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

    /* ── Header ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .logo-icon { font-size: 20px; }

    /* ── Home ── */
    .hero-title {
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero-title .highlight { color: var(--accent); }

    .hero-sub {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    .input-group {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .input-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 16px;
    }
    .input-icon { font-size: 20px; flex-shrink: 0; }
    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
    }
    input[type="text"]::placeholder { color: var(--muted); }

    /* ── History ── */
    .history-section { margin-bottom: 24px; }

    .history-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .history-list { display: flex; flex-direction: column; gap: 8px; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .history-item:hover { border-color: var(--accent); }

    .history-item-info { flex: 1; min-width: 0; }
    .history-item-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item-url {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: monospace;
      margin-top: 2px;
    }

    .history-delete {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
      transition: color .15s;
    }
    .history-delete:hover { color: #ff5555; }

    /* API URL setting */
    .api-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .api-row label { font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .api-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 12px;
      outline: none;
    }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 18px;
      background: var(--accent);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Back button ── */
    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      margin-bottom: 24px;
      align-self: flex-start;
      line-height: 1;
    }

    /* ── Episode List ── */
    .podcast-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 8px;
    }
    .podcast-icon {
      width: 56px;
      height: 56px;
      background: #2a2a4a;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .podcast-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }
    .episode-count {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .episode-count span { color: var(--accent); }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .episode-list { display: flex; flex-direction: column; gap: 0; }

    .episode-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      border-radius: 8px;
      padding-left: 8px;
      padding-right: 8px;
    }
    .episode-item:hover { background: var(--surface); }
    .episode-item:last-child { border-bottom: none; }

    .ep-num {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      width: 26px;
      flex-shrink: 0;
      text-align: right;
    }
    .ep-info { flex: 1; min-width: 0; }
    .ep-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .ep-date { font-size: 12px; color: var(--purple); font-family: monospace; }
    .ep-arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }

    .transcript-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      color: #000;
      background: var(--accent);
      border-radius: 4px;
      padding: 2px 6px;
      flex-shrink: 0;
    }

    /* ── Processing ── */
    #screen-processing {
      justify-content: center;
      min-height: 100vh;
      padding-top: 0;
      padding-bottom: 0;
      gap: 0;
    }

    .proc-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .proc-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    .proc-current-step {
      font-size: 14px;
      color: var(--accent);
      text-align: center;
      margin-bottom: 20px;
      min-height: 20px;
      font-family: monospace;
      letter-spacing: .5px;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--surface);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .6s ease;
      width: 0%;
    }

    .progress-pct {
      font-size: 13px;
      color: var(--muted);
      text-align: right;
      margin-bottom: 32px;
      font-family: monospace;
    }

    .step-checklist {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
    }

    .step-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .step-row:last-child { border-bottom: none; }

    .step-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      transition: all .3s;
    }
    .step-dot.done   { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .step-dot.active { border-color: var(--accent); animation: dotPulse 1s ease-in-out infinite; }
    @keyframes dotPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(204,255,0,.5); }
      50%      { box-shadow: 0 0 0 5px rgba(204,255,0,0); }
    }

    .step-name { color: var(--muted); transition: color .3s; }
    .step-row.active .step-name  { color: var(--text); font-weight: 600; }
    .step-row.done   .step-name  { color: var(--muted); }

    .btn-cancel {
      margin-top: 32px;
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .btn-cancel:hover { color: #ff5555; border-color: #ff5555; }

    /* ── Summary ── */
    .summary-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    #done-lottie {
      display: flex;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
      max-height: 0;
      margin-bottom: 0;
      /* 消失：先淡出，再收縮 */
      transition: opacity .35s ease,
                  max-height .45s cubic-bezier(.4,0,.2,1) .3s,
                  margin-bottom .45s cubic-bezier(.4,0,.2,1) .3s;
    }
    #done-lottie.visible {
      opacity: 1;
      max-height: 150px;
      margin-bottom: 16px;
      /* 出現：先展開，再淡入 */
      transition: max-height .28s ease,
                  opacity .3s ease .1s,
                  margin-bottom .28s ease;
      animation: lottie-pop .38s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes lottie-pop {
      from { transform: scale(.7); }
      to   { transform: scale(1); }
    }
    .summary-header h1 { font-size: 22px; font-weight: 700; }

    .section-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--accent);
      opacity: .3;
    }

    .summary-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      font-size: 15px;
      line-height: 1.75;
      color: #ddd;
      margin-bottom: 36px;
      border-left: 3px solid var(--accent);
    }

    .keypoints { display: flex; flex-direction: column; gap: 12px; margin-bottom: 36px; }

    .keypoint-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    .kp-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      width: 24px;
      padding-top: 1px;
    }
    .kp-text { font-size: 14px; line-height: 1.6; color: #ddd; }

    .btn-secondary {
      width: 100%;
      padding: 16px;
      background: transparent;
      color: var(--accent);
      font-size: 15px;
      font-weight: 600;
      border: 1.5px solid var(--accent);
      border-radius: 14px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:hover { background: var(--accent-dim); }

    /* ── Chat ── */
    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      max-height: 360px;
      overflow-y: auto;
    }
    .chat-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: var(--accent);
      color: #000;
      font-weight: 500;
    }
    .chat-bubble.ai {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #ddd;
    }
    .chat-bubble.loading { color: var(--muted); font-style: italic; }
    .chat-input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }
    .chat-input-row input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
    }
    .chat-input-row input:focus { outline: none; border-color: var(--accent); }
    .chat-send-btn {
      padding: 12px 20px;
      background: var(--accent);
      color: #000;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .chat-send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Search screen ── */
    .search-result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .search-result-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .search-result-podcast { font-size: 12px; color: var(--accent); margin-bottom: 8px; }
    .search-result-excerpt { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .no-results { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }

    /* ── Analyzed badge ── */
    .analyzed-badge {
      font-size: 10px;
      color: var(--accent);
      font-weight: 700;
      padding: 2px 6px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .episode-item.analyzed {
      border-left: 3px solid var(--accent);
      padding-left: 6px;
      background: rgba(204,255,0,0.04);
    }

    /* ── Search link on home ── */
    .search-all-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 16px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .search-all-link:hover { color: var(--text); }

    /* ── Orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(100px);
      will-change: transform;
    }
    .orb-1 { width: 420px; height: 420px; background: var(--accent); opacity: .055; top: 0; left: 0; }
    .orb-2 { width: 280px; height: 280px; background: var(--purple); opacity: .07; top: 0; left: 0; }

    /* ── Custom cursor (only on pointer-fine devices) ── */
    @media (pointer: fine) {
      * { cursor: none !important; }
    }
    .cursor-dot, .cursor-ring { display: none; }
    @media (pointer: fine) {
      #cursor-trail {
        display: block;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 9;
      }
      .cursor-dot {
        display: block;
        position: fixed;
        width: 6px; height: 6px;
        background: var(--accent);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        will-change: left, top;
        transition: transform .08s;
      }
      .cursor-dot.clicking { transform: translate(-50%, -50%) scale(.5); }
      .cursor-ripple {
        position: fixed;
        width: 4px; height: 4px;
        border: 1.5px solid var(--accent);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9997;
        animation: cursor-ripple-out .55s ease-out forwards;
      }
      @keyframes cursor-ripple-out {
        to { width: 60px; height: 60px; opacity: 0; }
      }
      .cursor-ring {
        display: block;
        position: fixed;
        width: 28px; height: 28px;
        border: 1.5px solid rgba(204,255,0,.45);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition: width .18s, height .18s, border-color .18s;
        will-change: left, top;
      }
      .cursor-ring.hover {
        width: 46px; height: 46px;
        border-color: rgba(204,255,0,.85);
      }
    }

    /* ── Sticky podcast header ── */
    .podcast-header-wrap {
      position: sticky;
      top: 0;
      background: rgba(13,13,13,.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 10;
      margin: -8px -24px 0;
      padding: 16px 24px 12px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #ff4444;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      transition: transform .3s ease;
      z-index: 999;
      white-space: nowrap;
      max-width: calc(100vw - 48px);
      text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<canvas id="cursor-trail"></canvas>
<div class="cursor-dot" id="cursor-dot"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<div id="app">

  <!-- ════════ HOME ════════ -->
  <section id="screen-home" class="screen active">
    <div class="logo">
      <span class="logo-icon">🎙️</span>
      PODAGENT
    </div>

    <h1 class="hero-title">
      丟 RSS，<br>
      AI 幫你<span class="highlight">聽完</span>
    </h1>
    <p class="hero-sub">
      貼上 Podcast RSS 連結<br>
      AI 自動整理摘要與重點
    </p>

    <div class="input-group">
      <div class="input-label">Podcast RSS URL</div>
      <div class="input-row">
        <span class="input-icon">📡</span>
        <input id="rss-input" type="text"
          placeholder="貼上 RSS URL 或 YouTube 影片網址..." />
      </div>
    </div>

    <div id="history-section" class="history-section" style="display:none">
      <div class="history-label">最近搜尋</div>
      <div class="history-list" id="history-list"></div>
    </div>

    <span class="search-all-link" id="btn-open-search">🔍 搜尋已分析的集數</span>

    <div class="api-row">
      <label>API:</label>
      <input id="api-url" type="text" value="https://inspiring-amazement-production-d8bc.up.railway.app" />
    </div>

    <button class="btn-primary" id="btn-get-episodes">取得節目列表</button>
  </section>

  <!-- ════════ SEARCH ════════ -->
  <section id="screen-search" class="screen">
    <button class="back-btn" id="back-from-search">←</button>
    <div class="logo" style="margin-bottom:24px"><span>🔍</span> 跨集搜尋</div>

    <div class="input-group">
      <div class="input-label">搜尋關鍵字</div>
      <div class="input-row">
        <input id="search-input" type="text" placeholder="輸入想找的主題或關鍵字..." />
      </div>
    </div>
    <button class="btn-primary" id="btn-search-exec" style="margin-bottom:24px">搜尋</button>
    <div id="search-results"></div>
  </section>

  <!-- ════════ EPISODE LIST ════════ -->
  <section id="screen-episodes" class="screen">
    <button class="back-btn" id="back-from-episodes">←</button>

    <div class="podcast-header-wrap">
      <div class="podcast-header">
        <div class="podcast-icon">🎙️</div>
        <div>
          <div class="podcast-title" id="podcast-title">—</div>
          <div class="episode-count">共 <span id="episode-count">0</span> 集 · 點選開始分析</div>
        </div>
      </div>
      <div class="divider" style="margin:12px 0 0"></div>
    </div>
    <div class="episode-list" id="episode-list"></div>
  </section>

  <!-- ════════ PROCESSING ════════ -->
  <section id="screen-processing" class="screen">
    <div class="proc-icon">
      <lottie-player
        src="https://assets2.lottiefiles.com/packages/lf20_qp1q7mct.json"
        background="transparent"
        speed="1"
        style="width:160px;height:160px"
        loop autoplay>
      </lottie-player>
    </div>
    <div class="proc-title">AI 分析中</div>
    <div class="proc-current-step" id="proc-current-step">初始化...</div>

    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-pct" id="progress-pct">0%</div>

    <div class="step-checklist">
      <div class="step-row" id="srow-download">
        <div class="step-dot" id="sdot-download"></div>
        <span class="step-name" id="sname-download">下載音訊</span>
      </div>
      <div class="step-row" id="srow-whisper">
        <div class="step-dot" id="sdot-whisper"></div>
        <span class="step-name" id="sname-whisper">語音轉文字</span>
        <span id="whisper-skip-badge" style="display:none;font-size:10px;color:var(--muted);margin-left:auto;font-family:monospace;">已跳過</span>
      </div>
      <div class="step-row" id="srow-ai">
        <div class="step-dot" id="sdot-ai"></div>
        <span class="step-name">AI 生成摘要</span>
      </div>
    </div>

    <button class="btn-cancel" id="btn-cancel-analysis">終止分析</button>
  </section>

  <!-- ════════ SUMMARY ════════ -->
  <section id="screen-summary" class="screen">
    <div id="done-lottie">
      <lottie-player
        id="done-lottie-player"
        src="https://assets2.lottiefiles.com/packages/lf20_jbrw3hcz.json"
        background="transparent"
        speed="1"
        style="width:120px;height:120px">
      </lottie-player>
    </div>
    <div class="summary-header">
      <button class="back-btn" id="back-from-summary" style="margin:0">←</button>
      <h1>摘要重點</h1>
    </div>

    <div class="section-label">摘要</div>
    <div class="summary-box" id="summary-text">—</div>

    <div class="section-label">重點整理</div>
    <div class="keypoints" id="keypoints-list"></div>

    <div class="section-label" style="margin-top:8px">問答</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" placeholder="問這集的任何問題..." />
      <button class="chat-send-btn" id="chat-send">送出</button>
    </div>

    <button class="btn-secondary" id="btn-analyze-another">分析另一集</button>
  </section>

</div>

<div id="toast"></div>

<script>
  const API_BASE = () => document.getElementById('api-url').value.replace(/\/$/, '');

  // ── Episode cache (localStorage) ──
  const CACHE_KEY = 'podagent_cache';

  function getCachedResult(episodeUrl) {
    try { return (JSON.parse(localStorage.getItem(CACHE_KEY)) || {})[episodeUrl] || null; }
    catch { return null; }
  }

  function setCachedResult(episodeUrl, result) {
    try {
      const cache = JSON.parse(localStorage.getItem(CACHE_KEY)) || {};
      cache[episodeUrl] = result;
      localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
    } catch {}
  }

  // ── History (localStorage) ──
  const HISTORY_KEY = 'podagent_history';
  const MAX_HISTORY = 10;

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveToHistory(title, url) {
    let history = loadHistory();
    history = history.filter(h => h.url !== url);          // 去重
    history.unshift({ title, url });                        // 最新的放最前
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function deleteFromHistory(url) {
    const history = loadHistory().filter(h => h.url !== url);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const history = loadHistory();
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');

    if (history.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = '';

    history.forEach(({ title, url }) => {
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="history-item-info">
          <div class="history-item-title">${escHtml(title)}</div>
          <div class="history-item-url">${escHtml(url)}</div>
        </div>
        <button class="history-delete" title="刪除">×</button>
      `;
      item.querySelector('.history-item-info').addEventListener('click', () => {
        document.getElementById('rss-input').value = url;
        document.getElementById('btn-get-episodes').click();
      });
      item.querySelector('.history-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteFromHistory(url);
      });
      list.appendChild(item);
    });
  }

  renderHistory();

  // ── YouTube URL 偵測 ──
  function isYouTubeUrl(url) {
    return /^https?:\/\/(www\.)?(youtube\.com\/watch|youtu\.be\/)/.test(url.trim());
  }
  function isYouTubeChannelUrl(url) {
    return /youtube\.com\/(channel\/|user\/|c\/|@)/.test(url.trim());
  }

  // ── Analyzed badges ──
  function updateAnalyzedBadges() {
    document.querySelectorAll('.episode-item[data-episode-url]').forEach(item => {
      const url = item.dataset.episodeUrl;
      if (!url || !getCachedResult(url)) return;
      item.classList.add('analyzed');
      if (!item.querySelector('.analyzed-badge')) {
        const badge = document.createElement('span');
        badge.className = 'analyzed-badge';
        badge.textContent = '✓ 已分析';
        const arrow = item.querySelector('.ep-arrow');
        arrow ? item.insertBefore(badge, arrow) : item.appendChild(badge);
      }
    });
  }

  // ── Screen navigation ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'screen-episodes') updateAnalyzedBadges();
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }

  // ── Progress UI ──
  const PHASE_MAP = {
    '取得 YouTube 字幕': 'download',
    '下載音訊中':        'download',
    '下載字幕':          'download',
    '語音轉文字':        'whisper',
    'AI 生成摘要':       'ai',
    '完成':              'ai',
  };

  function resetProgress() {
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-pct').textContent = '0%';
    document.getElementById('proc-current-step').textContent = '初始化...';
    document.getElementById('sname-download').textContent = '下載音訊';
    document.getElementById('sname-whisper').textContent = '語音轉文字';
    document.getElementById('whisper-skip-badge').style.display = 'none';
    ['download','whisper','ai'].forEach(k => {
      const dot = document.getElementById(`sdot-${k}`);
      const row = document.getElementById(`srow-${k}`);
      dot.className = 'step-dot';
      dot.textContent = '';
      row.className = 'step-row';
    });
  }

  function updateProgress({ step, progress }) {
    document.getElementById('progress-fill').style.width = progress + '%';
    document.getElementById('progress-pct').textContent = progress + '%';
    document.getElementById('proc-current-step').textContent = step;

    if (step === '下載字幕') {
      document.getElementById('sname-download').textContent = '下載字幕';
      // 字幕模式：標記語音轉文字為已跳過
      document.getElementById('sname-whisper').textContent = '語音轉文字';
      document.getElementById('whisper-skip-badge').style.display = 'inline';
      const dot = document.getElementById('sdot-whisper');
      const row = document.getElementById('srow-whisper');
      dot.className = 'step-dot';
      dot.textContent = '—';
      dot.style.color = 'var(--muted)';
      row.className = 'step-row';
    }

    if (step.startsWith('語音轉文字')) {
      document.getElementById('sname-whisper').textContent = step;
    }

    const phaseOrder = ['download','whisper','ai'];
    const activeKey = Object.entries(PHASE_MAP).find(([k]) => step.startsWith(k))?.[1];

    phaseOrder.forEach(k => {
      const dot = document.getElementById(`sdot-${k}`);
      const row = document.getElementById(`srow-${k}`);
      const idx = phaseOrder.indexOf(k);
      const activeIdx = phaseOrder.indexOf(activeKey);

      if (idx < activeIdx) {
        dot.className = 'step-dot done'; dot.textContent = '✓'; row.className = 'step-row done';
      } else if (k === activeKey) {
        dot.className = 'step-dot active'; dot.textContent = ''; row.className = 'step-row active';
      } else {
        dot.className = 'step-dot'; dot.textContent = ''; row.className = 'step-row';
      }
    });
  }

  // ── State ──
  let currentEpisodes = [];
  let currentPodcastTitle = '';
  let activeSource = null;
  let currentEpisodeUrl = '';

  // ── Get Episodes ──
  document.getElementById('btn-get-episodes').addEventListener('click', async () => {
    const input = document.getElementById('rss-input').value.trim();
    if (!input) { showToast('請先輸入 RSS 或 YouTube 網址'); return; }

    const btn = document.getElementById('btn-get-episodes');
    btn.disabled = true;
    btn.textContent = '載入中...';

    try {
      if (isYouTubeChannelUrl(input)) {
        // ── YouTube 頻道流程 ──
        const res = await fetch(`${API_BASE()}/youtube/channel?url=${encodeURIComponent(input)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        saveToHistory(`📺 ${data.channel_title}`, input);
        document.getElementById('podcast-title').textContent = data.channel_title;
        document.getElementById('episode-count').textContent = `共 ${data.videos.length} 支影片 · 點選開始分析`;

        const list = document.getElementById('episode-list');
        list.innerHTML = '';
        data.videos.forEach((v, i) => {
          const item = document.createElement('div');
          item.className = 'episode-item';
          item.innerHTML = `
            <span class="ep-num">${String(i + 1).padStart(2, '0')}</span>
            <div class="ep-info">
              <div class="ep-title">${escHtml(v.title)}</div>
              <div class="ep-date">${v.upload_date || '—'}${v.duration ? ' · ' + fmtDuration(v.duration) : ''}</div>
            </div>
            <span class="transcript-badge">YT</span>
            <span class="ep-arrow">›</span>
          `;
          item.dataset.episodeUrl = v.url;
          item.addEventListener('click', () => analyzeEpisode(null, null, null, v.url, v.title, data.channel_title));
          list.appendChild(item);
        });
        updateAnalyzedBadges();
        showScreen('screen-episodes');

      } else if (isYouTubeUrl(input)) {
        // ── YouTube 單支影片流程 ──
        const res = await fetch(`${API_BASE()}/youtube/info?url=${encodeURIComponent(input)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const info = await res.json();

        saveToHistory(`▶ ${info.title}`, input);
        document.getElementById('podcast-title').textContent = info.title;
        document.getElementById('episode-count').textContent = `${info.uploader} · 點選開始分析`;

        const list = document.getElementById('episode-list');
        list.innerHTML = '';
        const item = document.createElement('div');
        item.className = 'episode-item';
        item.innerHTML = `
          <span class="ep-num">▶</span>
          <div class="ep-info">
            <div class="ep-title">${escHtml(info.title)}</div>
            <div class="ep-date">${info.uploader}${info.duration ? ' · ' + fmtDuration(info.duration) : ''}</div>
          </div>
          <span class="transcript-badge">YT</span>
          <span class="ep-arrow">›</span>
        `;
        item.dataset.episodeUrl = input;
        item.addEventListener('click', () => analyzeEpisode(null, null, null, input, info.title, info.uploader));
        list.appendChild(item);
        updateAnalyzedBadges();
        showScreen('screen-episodes');

      } else {
        // ── RSS 流程 ──
        const res = await fetch(`${API_BASE()}/podcast?rss_url=${encodeURIComponent(input)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        currentPodcastTitle = data.podcast_title;
        currentEpisodes = data.episodes;

        saveToHistory(data.podcast_title, input);
        document.getElementById('podcast-title').textContent = data.podcast_title;
        document.getElementById('episode-count').textContent = `共 ${data.episodes.length} 集 · 點選開始分析`;

        const list = document.getElementById('episode-list');
        list.innerHTML = '';
        data.episodes.forEach((ep, i) => {
          const item = document.createElement('div');
          item.className = 'episode-item';
          const badge = ep.transcript_url ? `<span class="transcript-badge">字幕</span>` : '';
          item.innerHTML = `
            <span class="ep-num">${String(i + 1).padStart(2, '0')}</span>
            <div class="ep-info">
              <div class="ep-title">${escHtml(ep.title)}</div>
              <div class="ep-date">${ep.publish_time || '—'}</div>
            </div>
            ${badge}
            <span class="ep-arrow">›</span>
          `;
          item.dataset.episodeUrl = ep.mp3_url || '';
          item.addEventListener('click', () => analyzeEpisode(ep.mp3_url, ep.transcript_url, ep.transcript_type, null, ep.title, currentPodcastTitle));
          list.appendChild(item);
        });
        updateAnalyzedBadges();
        showScreen('screen-episodes');
      }
    } catch (e) {
      showToast('取得失敗：' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '取得節目列表';
    }
  });

  function fmtDuration(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  // ── Analyze Episode via SSE ──
  function analyzeEpisode(mp3Url, transcriptUrl, transcriptType, youtubeUrl, episodeTitle, podcastTitle) {
    if (activeSource) { activeSource.close(); activeSource = null; }
    resetProgress();
    showScreen('screen-processing');

    currentEpisodeUrl = youtubeUrl || mp3Url || '';
    document.getElementById('chat-messages').innerHTML = '';

    const cached = getCachedResult(currentEpisodeUrl);
    if (cached) {
      renderSummary(cached);
      showScreen('screen-summary');
      return;
    }

    let url;
    if (youtubeUrl) {
      url = `${API_BASE()}/analyze/stream?youtube_url=${encodeURIComponent(youtubeUrl)}`;
    } else {
      url = `${API_BASE()}/analyze/stream?mp3_url=${encodeURIComponent(mp3Url)}`;
      if (transcriptUrl) {
        url += `&transcript_url=${encodeURIComponent(transcriptUrl)}`;
        if (transcriptType) url += `&transcript_type=${encodeURIComponent(transcriptType)}`;
      }
    }
    if (episodeTitle) url += `&episode_title=${encodeURIComponent(episodeTitle)}`;
    if (podcastTitle) url += `&podcast_title=${encodeURIComponent(podcastTitle)}`;
    const es = new EventSource(url);
    activeSource = es;
    let completed = false;

    es.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.step === 'error') {
        completed = true;
        es.close(); activeSource = null;
        showToast('分析失敗：' + data.error);
        showScreen('screen-episodes');
        return;
      }

      updateProgress(data);

      if (data.progress === 100) {
        completed = true;
        es.close(); activeSource = null;
        setCachedResult(currentEpisodeUrl, data.result);
        renderSummary(data.result);
        showScreen('screen-summary');
      }
    };

    es.onerror = () => {
      if (completed) return;
      es.close(); activeSource = null;
      showToast('連線中斷，請重試');
      showScreen('screen-episodes');
    };
  }

  // ── Render Summary ──
  function renderSummary(data) {
    const doneLottie = document.getElementById('done-lottie');
    const donePlayer = document.getElementById('done-lottie-player');

    // 先瞬間重置（不帶過渡），再下一幀觸發入場動畫
    doneLottie.style.transition = 'none';
    doneLottie.classList.remove('visible');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      doneLottie.style.transition = '';
      doneLottie.classList.add('visible');
      donePlayer.seek(0);
      donePlayer.play();
      donePlayer.addEventListener('complete', () => {
        doneLottie.classList.remove('visible'); // 觸發兩段式消失過渡
      }, { once: true });
    }));

    document.getElementById('summary-text').textContent = data.answer || '（無摘要）';

    const kpList = document.getElementById('keypoints-list');
    kpList.innerHTML = '';
    (data.key_points || []).forEach((kp, i) => {
      const item = document.createElement('div');
      item.className = 'keypoint-item';
      item.innerHTML = `
        <span class="kp-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="kp-text">${escHtml(kp)}</span>
      `;
      kpList.appendChild(item);
    });
  }

  // ── Cancel analysis ──
  document.getElementById('btn-cancel-analysis').addEventListener('click', () => {
    if (activeSource) { activeSource.close(); activeSource = null; }
    showScreen('screen-episodes');
  });

  // ── Chat ──
  async function sendChat() {
    const input = document.getElementById('chat-input');
    const question = input.value.trim();
    if (!question || !currentEpisodeUrl) return;

    const messages = document.getElementById('chat-messages');
    const sendBtn = document.getElementById('chat-send');

    const userBubble = document.createElement('div');
    userBubble.className = 'chat-bubble user';
    userBubble.textContent = question;
    messages.appendChild(userBubble);

    const loadingBubble = document.createElement('div');
    loadingBubble.className = 'chat-bubble ai loading';
    loadingBubble.textContent = '思考中...';
    messages.appendChild(loadingBubble);
    messages.scrollTop = messages.scrollHeight;

    input.value = '';
    sendBtn.disabled = true;

    try {
      const res = await fetch(`${API_BASE()}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, episode_url: currentEpisodeUrl }),
      });
      const data = await res.json();
      loadingBubble.className = 'chat-bubble ai';
      loadingBubble.textContent = data.answer;
    } catch (e) {
      loadingBubble.className = 'chat-bubble ai';
      loadingBubble.textContent = '發生錯誤，請稍後再試。';
    } finally {
      sendBtn.disabled = false;
      messages.scrollTop = messages.scrollHeight;
    }
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChat();
  });

  // ── Search ──
  document.getElementById('btn-open-search').addEventListener('click', () => showScreen('screen-search'));
  document.getElementById('back-from-search').addEventListener('click', () => showScreen('screen-home'));

  document.getElementById('btn-search-exec').addEventListener('click', async () => {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;

    const btn = document.getElementById('btn-search-exec');
    const container = document.getElementById('search-results');
    btn.disabled = true;
    btn.textContent = '搜尋中...';
    container.innerHTML = '';

    try {
      const res = await fetch(`${API_BASE()}/search?query=${encodeURIComponent(query)}`);
      const results = await res.json();

      if (!results.length) {
        container.innerHTML = '<div class="no-results">沒有找到相關集數，試著分析幾集後再搜尋。</div>';
        return;
      }
      results.forEach(r => {
        const card = document.createElement('div');
        card.className = 'search-result';
        card.innerHTML = `
          <div class="search-result-title">${escHtml(r.episode_title)}</div>
          ${r.podcast_title ? `<div class="search-result-podcast">${escHtml(r.podcast_title)}</div>` : ''}
          <div class="search-result-excerpt">${escHtml(r.excerpt)}…</div>
        `;
        container.appendChild(card);
      });
    } catch (e) {
      container.innerHTML = '<div class="no-results">搜尋失敗，請確認後端連線正常。</div>';
    } finally {
      btn.disabled = false;
      btn.textContent = '搜尋';
    }
  });

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-search-exec').click();
  });

  // ── Navigation ──
  document.getElementById('back-from-episodes').addEventListener('click', () => showScreen('screen-home'));
  document.getElementById('back-from-summary').addEventListener('click', () => showScreen('screen-episodes'));
  document.getElementById('btn-analyze-another').addEventListener('click', () => showScreen('screen-episodes'));

  // ── Enter key on RSS input ──
  document.getElementById('rss-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-get-episodes').click();
  });

  // ── Mouse following: orbs + custom cursor + trail + ripple ──
  (function () {
    const dot    = document.getElementById('cursor-dot');
    const ring   = document.getElementById('cursor-ring');
    const orb1   = document.querySelector('.orb-1');
    const orb2   = document.querySelector('.orb-2');
    const canvas = document.getElementById('cursor-trail');
    const ctx    = canvas ? canvas.getContext('2d') : null;

    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let rx = mx, ry = my;
    let o1x = mx, o1y = my;
    let o2x = mx * .7, o2y = my * .7;

    // Trail points
    const TRAIL = 22;
    const pts = Array.from({length: TRAIL}, () => ({x: mx, y: my}));

    function resizeCanvas() {
      if (!canvas) return;
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    document.addEventListener('mouseover', e => {
      if (e.target.closest('button, a, .episode-item, .history-item, .search-result, input, .search-all-link')) {
        ring.classList.add('hover');
      } else {
        ring.classList.remove('hover');
      }
    });

    // Click ripple
    document.addEventListener('mousedown', e => {
      dot.classList.add('clicking');
      const r = document.createElement('div');
      r.className = 'cursor-ripple';
      r.style.left = e.clientX + 'px';
      r.style.top  = e.clientY + 'px';
      document.body.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    });
    document.addEventListener('mouseup', () => dot.classList.remove('clicking'));

    function lerp(a, b, t) { return a + (b - a) * t; }

    function tick() {
      // Cursor dot: immediate
      dot.style.left = mx + 'px';
      dot.style.top  = my + 'px';

      // Cursor ring: lag
      rx = lerp(rx, mx, .1);
      ry = lerp(ry, my, .1);
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';

      // Orb 1: slow follow (accent)
      o1x = lerp(o1x, mx, .035);
      o1y = lerp(o1y, my, .035);
      orb1.style.transform = `translate(${o1x - 210}px,${o1y - 210}px)`;

      // Orb 2: medium follow (purple), offset direction
      o2x = lerp(o2x, window.innerWidth - mx, .055);
      o2y = lerp(o2y, window.innerHeight - my, .055);
      orb2.style.transform = `translate(${o2x - 140}px,${o2y - 140}px)`;

      // Trail
      if (ctx) {
        pts.pop();
        pts.unshift({x: mx, y: my});
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pts.forEach((p, i) => {
          const t = i / TRAIL;
          const alpha = (1 - t) * .35;
          const r = (1 - t) * 4;
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(r, .5), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(204,255,0,${alpha})`;
          ctx.fill();
        });
      }

      requestAnimationFrame(tick);
    }
    tick();
  })();

  // ── Utils ──
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
