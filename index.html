<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodAgent — AI 幫你聽完</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #09090b;
      --surface:    #131316;
      --surface-2:  #1a1a1f;
      --border:     rgba(255,255,255,.06);
      --border-h:   rgba(255,255,255,.12);
      --accent:     #a3e635;
      --accent-soft: rgba(163,230,53,.10);
      --accent-mid:  rgba(163,230,53,.20);
      --text:       #fafafa;
      --text-2:     #a1a1aa;
      --text-3:     #52525b;
      --danger:     #ef4444;
      --radius:     12px;
      --radius-lg:  16px;
      --radius-xl:  20px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 640px;
      padding: 32px 20px 100px;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }
    .screen.active {
      display: flex;
      animation: screenIn .35s cubic-bezier(.2,.9,.3,1);
    }

    @keyframes screenIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Global Nav ── */
    .nav-bar {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--text);
    }
    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #65a30d);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .nav-link {
      font-size: 13px;
      color: var(--text-2);
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      transition: all .15s;
      text-decoration: none;
    }
    .nav-link:hover { color: var(--text); border-color: var(--border-h); background: var(--surface); }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--text-2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 0;
      margin-bottom: 20px;
      transition: color .15s;
      align-self: flex-start;
    }
    .back-btn:hover { color: var(--text); }
    .back-btn svg { width: 16px; height: 16px; }

    /* ── Hero ── */
    .hero-title {
      font-size: clamp(32px, 7vw, 48px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -.02em;
      margin-bottom: 12px;
    }
    .hero-title .accent { color: var(--accent); }

    .hero-sub {
      color: var(--text-2);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* ── Input ── */
    .input-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    .input-group:focus-within {
      border-color: rgba(163,230,53,.3);
    }
    .input-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-3);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .input-icon {
      color: var(--text-3);
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }
    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
    }
    input[type="text"]::placeholder { color: var(--text-3); }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      background: var(--accent);
      color: #000;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(163,230,53,.2); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; filter: none; box-shadow: none; }

    .btn-secondary {
      width: 100%;
      padding: 14px 20px;
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-secondary:hover { border-color: var(--border-h); background: var(--surface-2); }

    .btn-cancel {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--text-3);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
    }
    .btn-cancel:hover { color: var(--danger); border-color: rgba(239,68,68,.3); }

    /* ── History ── */
    .history-section { margin-bottom: 20px; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-3);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .history-list { display: flex; flex-direction: column; gap: 4px; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 10px 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .history-item:hover { background: var(--surface); border-color: var(--border); }

    .history-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .history-item-info { flex: 1; min-width: 0; }
    .history-item-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item-url {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .history-delete {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
      line-height: 1;
      transition: color .15s;
      opacity: 0;
      border-radius: 6px;
    }
    .history-item:hover .history-delete { opacity: 1; }
    .history-delete:hover { color: var(--danger); }

    /* ── API row ── */
    .api-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .api-row label { font-size: 12px; color: var(--text-3); flex-shrink: 0; font-weight: 500; }
    .api-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-3);
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      transition: border-color .15s;
    }
    .api-row input:focus { border-color: var(--border-h); }

    /* ── Episode List ── */
    .podcast-header-wrap {
      position: sticky;
      top: 0;
      background: rgba(9,9,11,.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 10;
      margin: 0 -20px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .podcast-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .podcast-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #2d1b69, #1e3a5f);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .podcast-meta { flex: 1; min-width: 0; }
    .podcast-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .episode-count {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 2px;
    }
    .episode-count span { color: var(--accent); font-weight: 600; }

    .episode-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-top: 8px;
    }

    .episode-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 12px;
      cursor: pointer;
      transition: all .15s;
      border-radius: var(--radius);
      border: 1px solid transparent;
    }
    .episode-item:hover { background: var(--surface); border-color: var(--border); }

    .ep-num {
      font-size: 12px;
      color: var(--text-3);
      font-weight: 600;
      width: 28px;
      flex-shrink: 0;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .ep-info { flex: 1; min-width: 0; }
    .ep-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ep-date {
      font-size: 12px;
      color: var(--text-3);
      font-variant-numeric: tabular-nums;
    }
    .ep-arrow {
      color: var(--text-3);
      font-size: 14px;
      flex-shrink: 0;
      opacity: 0;
      transform: translateX(-4px);
      transition: all .15s;
    }
    .episode-item:hover .ep-arrow { opacity: 1; transform: translateX(0); }

    .transcript-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .5px;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 6px;
      padding: 3px 8px;
      flex-shrink: 0;
    }

    .analyzed-badge {
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
      padding: 3px 8px;
      background: var(--accent-soft);
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .episode-item.analyzed {
      background: var(--accent-soft);
    }
    .episode-item.analyzed:hover {
      background: var(--accent-mid);
    }

    /* ── Processing ── */
    #screen-processing {
      justify-content: center;
      min-height: 100vh;
      padding-top: 0;
      padding-bottom: 0;
      gap: 0;
    }

    .proc-header {
      text-align: center;
      margin-bottom: 32px;
      width: 100%;
    }

    .proc-anim {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      width: 100%;
    }
    .pulse-rings {
      position: relative;
      width: 100px;
      height: 100px;
    }
    .pulse-rings .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      animation: pulse-ring 2.4s cubic-bezier(.4,0,.6,1) infinite;
    }
    .pulse-rings .ring:nth-child(2) { animation-delay: .8s; }
    .pulse-rings .ring:nth-child(3) { animation-delay: 1.6s; }
    @keyframes pulse-ring {
      0%   { transform: scale(.5); opacity: .6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .pulse-rings .core {
      position: absolute;
      top: 50%; left: 50%;
      width: 36px; height: 36px;
      margin: -18px 0 0 -18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 30px rgba(163,230,53,.4);
      animation: core-breathe 2s ease-in-out infinite;
    }
    .pulse-rings .core-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 16px;
      line-height: 1;
    }
    @keyframes core-breathe {
      0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(163,230,53,.4); }
      50%     { transform: scale(1.1); box-shadow: 0 0 50px rgba(163,230,53,.6); }
    }

    .proc-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .proc-current-step {
      font-size: 13px;
      color: var(--accent);
      min-height: 20px;
      font-weight: 500;
    }

    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 4px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .progress-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
    }
    .progress-pct {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: var(--surface-2);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #65a30d, var(--accent));
      border-radius: 99px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    .step-checklist {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      transition: background .2s;
    }
    .step-row:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
    .step-row:last-child  { border-radius: 0 0 var(--radius-lg) var(--radius-lg); border-bottom: none; }
    .step-row:only-child  { border-radius: var(--radius-lg); }

    .step-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border-h);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
      transition: all .3s;
    }
    .step-dot.done {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }
    .step-dot.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(163,230,53,.15); }
      50%     { box-shadow: 0 0 0 6px rgba(163,230,53,.05); }
    }

    .step-name { color: var(--text-3); transition: color .3s; font-weight: 500; }
    .step-row.active .step-name { color: var(--text); }
    .step-row.done .step-name   { color: var(--text-2); }

    .whisper-skip {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-3);
      font-weight: 500;
    }

    /* ── Summary ── */
    .summary-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .summary-nav h1 { font-size: 22px; font-weight: 700; flex: 1; }

    #done-anim {
      display: flex;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
      max-height: 0;
      margin-bottom: 0;
      transition: opacity .35s ease,
                  max-height .45s cubic-bezier(.4,0,.2,1) .25s,
                  margin-bottom .45s cubic-bezier(.4,0,.2,1) .25s;
    }
    #done-anim.visible {
      opacity: 1;
      max-height: 130px;
      margin-bottom: 16px;
      transition: max-height .3s ease,
                  opacity .3s ease .1s,
                  margin-bottom .3s ease;
    }
    .done-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: done-pop .5s cubic-bezier(.34,1.56,.64,1);
      position: relative;
    }
    @keyframes done-pop {
      from { transform: scale(0) rotate(-45deg); }
      to   { transform: scale(1) rotate(0); }
    }
    .done-circle svg {
      width: 32px;
      height: 32px;
      stroke: #000;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .done-circle svg path {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: check-draw .4s ease .3s forwards;
    }
    @keyframes check-draw {
      to { stroke-dashoffset: 0; }
    }
    .done-particles {
      position: absolute;
      inset: -20px;
    }
    .done-particles span {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      top: 50%; left: 50%;
      animation: particle-burst .6s cubic-bezier(.2,.8,.3,1) forwards;
    }
    .done-particles span:nth-child(1) { animation-delay: .2s; --px: -40px; --py: -30px; }
    .done-particles span:nth-child(2) { animation-delay: .25s; --px: 35px; --py: -35px; }
    .done-particles span:nth-child(3) { animation-delay: .3s; --px: 40px; --py: 25px; }
    .done-particles span:nth-child(4) { animation-delay: .22s; --px: -35px; --py: 30px; }
    .done-particles span:nth-child(5) { animation-delay: .28s; --px: 0px; --py: -45px; }
    .done-particles span:nth-child(6) { animation-delay: .32s; --px: -25px; --py: -40px; background: #818cf8; }
    .done-particles span:nth-child(7) { animation-delay: .26s; --px: 30px; --py: -10px; background: #818cf8; }
    .done-particles span:nth-child(8) { animation-delay: .34s; --px: -10px; --py: 40px; background: #f472b6; }
    @keyframes particle-burst {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--px), var(--py)) scale(0); opacity: 0; }
    }

    .content-section {
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .summary-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-2);
      border-left: 3px solid var(--accent);
    }

    .keypoints { display: flex; flex-direction: column; gap: 8px; }

    .keypoint-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: border-color .15s;
    }
    .keypoint-item:hover { border-color: var(--border-h); }

    .kp-num {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kp-text { font-size: 14px; line-height: 1.7; color: var(--text-2); }

    /* ── Chat ── */
    .chat-section {
      margin-bottom: 28px;
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
      max-height: 400px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 4px; }

    .chat-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.7;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: var(--accent);
      color: #000;
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble.ai {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-bottom-left-radius: 4px;
    }
    .chat-bubble.loading {
      color: var(--text-3);
    }
    .chat-bubble.loading::after {
      content: '';
      display: inline-block;
      width: 12px;
      animation: dots 1.2s steps(4) infinite;
    }
    @keyframes dots {
      0%  { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
    }
    .chat-input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .chat-input-row input:focus { border-color: rgba(163,230,53,.3); }
    .chat-send-btn {
      padding: 12px 20px;
      background: var(--accent);
      color: #000;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
    }
    .chat-send-btn:hover { filter: brightness(1.1); }
    .chat-send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Search ── */
    .search-result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 8px;
      transition: border-color .15s;
    }
    .search-result:hover { border-color: var(--border-h); }
    .search-result-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .search-result-podcast { font-size: 12px; color: var(--accent); margin-bottom: 8px; font-weight: 500; }
    .search-result-excerpt { font-size: 13px; color: var(--text-3); line-height: 1.7; }
    .no-results { text-align: center; color: var(--text-3); padding: 48px 0; font-size: 14px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1c1c22;
      color: var(--text);
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      transition: transform .3s cubic-bezier(.2,.9,.3,1);
      z-index: 999;
      white-space: nowrap;
      max-width: calc(100vw - 48px);
      text-align: center;
      border: 1px solid rgba(239,68,68,.3);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Floating Orbs (mouse-following) ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(110px);
      will-change: transform;
    }
    .orb-1 { width: 450px; height: 450px; background: var(--accent); opacity: .05; top: 0; left: 0; }
    .orb-2 { width: 300px; height: 300px; background: #818cf8; opacity: .06; top: 0; left: 0; }
    .orb-3 { width: 200px; height: 200px; background: #f472b6; opacity: .035; top: 0; left: 0; }

    /* ── Custom Cursor ── */
    @media (pointer: fine) {
      * { cursor: none !important; }
    }
    .cursor-dot, .cursor-ring, #cursor-trail { display: none; }
    @media (pointer: fine) {
      #cursor-trail {
        display: block;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 9;
      }
      .cursor-dot {
        display: block;
        position: fixed;
        width: 5px; height: 5px;
        background: var(--accent);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        will-change: left, top;
        transition: transform .06s, width .15s, height .15s, background .15s;
        box-shadow: 0 0 8px rgba(163,230,53,.5);
      }
      .cursor-dot.clicking {
        transform: translate(-50%, -50%) scale(.4);
      }
      .cursor-dot.hovering {
        width: 8px; height: 8px;
        background: #fff;
        box-shadow: 0 0 12px rgba(255,255,255,.4);
      }
      .cursor-ring {
        display: block;
        position: fixed;
        width: 32px; height: 32px;
        border: 1.5px solid rgba(163,230,53,.35);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition: width .22s cubic-bezier(.25,.8,.25,1),
                    height .22s cubic-bezier(.25,.8,.25,1),
                    border-color .2s,
                    background .2s,
                    opacity .2s;
        will-change: left, top;
      }
      .cursor-ring.hover {
        width: 52px; height: 52px;
        border-color: rgba(163,230,53,.6);
        background: rgba(163,230,53,.06);
      }
      .cursor-ripple {
        position: fixed;
        width: 6px; height: 6px;
        border: 1.5px solid var(--accent);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9997;
        animation: ripple-expand .5s cubic-bezier(.2,.8,.3,1) forwards;
      }
      @keyframes ripple-expand {
        to { width: 50px; height: 50px; opacity: 0; }
      }
      .cursor-ripple-2 {
        position: fixed;
        width: 6px; height: 6px;
        border: 1px solid rgba(163,230,53,.4);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 9996;
        animation: ripple-expand-2 .65s cubic-bezier(.2,.8,.3,1) forwards;
      }
      @keyframes ripple-expand-2 {
        to { width: 80px; height: 80px; opacity: 0; }
      }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .screen { padding: 24px 16px 80px; }
      .podcast-header-wrap { margin: 0 -16px; padding: 14px 16px; }
      .hero-title { font-size: 32px; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-h); border-radius: 6px; }

    /* ── SVG icons inline ── */
    .icon { display: inline-flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<canvas id="cursor-trail"></canvas>
<div class="cursor-dot" id="cursor-dot"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<div id="app">

  <!-- ════════ HOME ════════ -->
  <section id="screen-home" class="screen active">
    <div class="nav-bar">
      <div class="logo">

      <button class="nav-link" id="btn-open-search">

    <h1 class="hero-title">

    <div class="input-group">

      <div class="input-row">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <input id="rss-input" type="text" placeholder="RSS URL 或 YouTube 網址..." />

    <div id="history-section" class="history-section" style="display:none">
      <div class="section-title">最近搜尋</div>
      <div class="history-list" id="history-list"></div>
    </div>

    <div class="api-row">
      <label>API</label>
      <input id="api-url" type="text" value="https://inspiring-amazement-production-d8bc.up.railway.app" />
    </div>

    <button class="btn-primary" id="btn-get-episodes">取得節目列表</button>
  </section>

  <!-- ════════ SEARCH ════════ -->
  <section id="screen-search" class="screen">
    <button class="back-btn" id="back-from-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>
      返回
    </button>

    <h1 class="hero-title" style="font-size:24px;margin-bottom:20px">跨集搜尋</h1>

    <div class="input-group" style="margin-bottom:12px">
      <div class="input-label">關鍵字</div>
      <div class="input-row">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search-input" type="text" placeholder="輸入想找的主題或關鍵字..." />
      </div>
    </div>
    <button class="btn-primary" id="btn-search-exec" style="margin-bottom:24px">搜尋</button>
    <div id="search-results"></div>
  </section>

  <!-- ════════ EPISODE LIST ════════ -->
  <section id="screen-episodes" class="screen" style="padding-top:0">
    <div style="padding-top:32px">
      <button class="back-btn" id="back-from-episodes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>
        返回
      </button>

    <div class="podcast-header-wrap">
      <div class="podcast-header">

          <div class="podcast-title" id="podcast-title">—</div>

  <!-- ════════ PROCESSING ════════ -->
  <section id="screen-processing" class="screen">
    <div class="proc-header">
      <div class="proc-anim">

          <div class="ring"></div>

    <div class="step-checklist">

      </div>
      <div class="step-row" id="srow-whisper">
        <div class="step-dot" id="sdot-whisper"></div>

      </div>

  <!-- ════════ SUMMARY ════════ -->
  <section id="screen-summary" class="screen">

</div>

<div id="toast"></div>

<script>
  const API_BASE = () => document.getElementById('api-url').value.replace(/\/$/, '');

  // ── Episode cache (localStorage) ──
  const CACHE_KEY = 'podagent_cache';

  function getCachedResult(episodeUrl) {
    try { return (JSON.parse(localStorage.getItem(CACHE_KEY)) || {})[episodeUrl] || null; }
    catch { return null; }
  }

  function setCachedResult(episodeUrl, result) {
    try {
      const cache = JSON.parse(localStorage.getItem(CACHE_KEY)) || {};
      cache[episodeUrl] = result;
      localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
    } catch {}
  }

  // ── History (localStorage) ──
  const HISTORY_KEY = 'podagent_history';
  const MAX_HISTORY = 10;

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveToHistory(title, url) {
    let history = loadHistory();
    history = history.filter(h => h.url !== url);
    history.unshift({ title, url });
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function deleteFromHistory(url) {
    const history = loadHistory().filter(h => h.url !== url);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const history = loadHistory();
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');

    if (history.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = '';

    history.forEach(({ title, url }) => {
      const isYT = url.includes('youtube.com') || url.includes('youtu.be');
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="history-item-icon">${isYT ? '📺' : '🎙'}</div>
        <div class="history-item-info">
          <div class="history-item-title">${escHtml(title)}</div>
          <div class="history-item-url">${escHtml(url)}</div>
        </div>
        <button class="history-delete" title="刪除">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      `;
      item.querySelector('.history-item-info').addEventListener('click', () => {
        document.getElementById('rss-input').value = url;
        document.getElementById('btn-get-episodes').click();
      });
      item.querySelector('.history-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteFromHistory(url);
      });
      list.appendChild(item);
    });
  }

  renderHistory();

  // ── YouTube URL detection ──
  function isYouTubeUrl(url) {
    return /^https?:\/\/(www\.)?(youtube\.com\/watch|youtu\.be\/)/.test(url.trim());
  }
  function isYouTubeChannelUrl(url) {
    return /youtube\.com\/(channel\/|user\/|c\/|@)/.test(url.trim());
  }

  // ── Analyzed badges ──
  function updateAnalyzedBadges() {
    document.querySelectorAll('.episode-item[data-episode-url]').forEach(item => {
      const url = item.dataset.episodeUrl;
      if (!url || !getCachedResult(url)) return;
      item.classList.add('analyzed');
      if (!item.querySelector('.analyzed-badge')) {
        const badge = document.createElement('span');
        badge.className = 'analyzed-badge';
        badge.textContent = '✓ 已分析';
        const arrow = item.querySelector('.ep-arrow');
        arrow ? item.insertBefore(badge, arrow) : item.appendChild(badge);
      }
    });
  }

  // ── Screen navigation ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'screen-episodes') updateAnalyzedBadges();
    window.scrollTo(0, 0);
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }

  // ── Progress UI ──
  const PHASE_MAP = {
    '取得 YouTube 字幕': 'download',
    '下載音訊中':        'download',
    '下載字幕':          'download',
    '語音轉文字':        'whisper',
    'AI 生成摘要':       'ai',
    '完成':              'ai',
  };

  function resetProgress() {
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-pct').textContent = '0%';
    document.getElementById('proc-current-step').textContent = '初始化...';
    document.getElementById('sname-download').textContent = '下載音訊';
    document.getElementById('sname-whisper').textContent = '語音轉文字';
    document.getElementById('whisper-skip-badge').style.display = 'none';
    ['download','whisper','ai'].forEach(k => {
      const dot = document.getElementById(`sdot-${k}`);
      const row = document.getElementById(`srow-${k}`);
      dot.className = 'step-dot';
      dot.textContent = '';
      row.className = 'step-row';
    });
  }

  function updateProgress({ step, progress }) {
    document.getElementById('progress-fill').style.width = progress + '%';
    document.getElementById('progress-pct').textContent = progress + '%';
    document.getElementById('proc-current-step').textContent = step;

    if (step === '下載字幕') {
      document.getElementById('sname-download').textContent = '下載字幕';
      document.getElementById('sname-whisper').textContent = '語音轉文字';
      document.getElementById('whisper-skip-badge').style.display = 'inline';
      const dot = document.getElementById('sdot-whisper');
      const row = document.getElementById('srow-whisper');
      dot.className = 'step-dot';
      dot.textContent = '—';
      dot.style.color = 'var(--text-3)';
      row.className = 'step-row';
    }

    if (step.startsWith('語音轉文字')) {
      document.getElementById('sname-whisper').textContent = step;
    }

    const phaseOrder = ['download','whisper','ai'];
    const activeKey = Object.entries(PHASE_MAP).find(([k]) => step.startsWith(k))?.[1];

    phaseOrder.forEach(k => {
      const dot = document.getElementById(`sdot-${k}`);
      const row = document.getElementById(`srow-${k}`);
      const idx = phaseOrder.indexOf(k);
      const activeIdx = phaseOrder.indexOf(activeKey);

      if (idx < activeIdx) {
        dot.className = 'step-dot done'; dot.textContent = '✓'; row.className = 'step-row done';
      } else if (k === activeKey) {
        dot.className = 'step-dot active'; dot.textContent = ''; row.className = 'step-row active';
      } else {
        dot.className = 'step-dot'; dot.textContent = ''; row.className = 'step-row';
      }
    });
  }

  // ── State ──
  let currentEpisodes = [];
  let currentPodcastTitle = '';
  let activeSource = null;
  let currentEpisodeUrl = '';

  // ── Get Episodes ──
  document.getElementById('btn-get-episodes').addEventListener('click', async () => {
    const input = document.getElementById('rss-input').value.trim();
    if (!input) { showToast('請先輸入 RSS 或 YouTube 網址'); return; }

    const btn = document.getElementById('btn-get-episodes');
    btn.disabled = true;
    btn.textContent = '載入中...';

    try {
      if (isYouTubeChannelUrl(input)) {
        const res = await fetch(`${API_BASE()}/youtube/channel?url=${encodeURIComponent(input)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        saveToHistory(`📺 ${data.channel_title}`, input);
        document.getElementById('podcast-title').textContent = data.channel_title;
        document.getElementById('episode-count').textContent = data.videos.length;

        const list = document.getElementById('episode-list');
        list.innerHTML = '';
        data.videos.forEach((v, i) => {
          const item = document.createElement('div');
          item.className = 'episode-item';
          item.innerHTML = `
            <span class="ep-num">${String(i + 1).padStart(2, '0')}</span>
            <div class="ep-info">
              <div class="ep-title">${escHtml(v.title)}</div>
              <div class="ep-date">${v.upload_date || '—'}${v.duration ? ' · ' + fmtDuration(v.duration) : ''}</div>
            </div>
            <span class="transcript-badge">YT</span>
            <span class="ep-arrow">→</span>
          `;
          item.dataset.episodeUrl = v.url;
          item.addEventListener('click', () => analyzeEpisode(null, null, null, v.url, v.title, data.channel_title));
          list.appendChild(item);
        });
        updateAnalyzedBadges();
        showScreen('screen-episodes');

      } else if (isYouTubeUrl(input)) {
        const res = await fetch(`${API_BASE()}/youtube/info?url=${encodeURIComponent(input)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const info = await res.json();

        saveToHistory(`▶ ${info.title}`, input);
        document.getElementById('podcast-title').textContent = info.title;
        document.getElementById('episode-count').textContent = '1';

        const list = document.getElementById('episode-list');
        list.innerHTML = '';
        const item = document.createElement('div');
        item.className = 'episode-item';
        item.innerHTML = `
          <span class="ep-num">▶</span>
          <div class="ep-info">
            <div class="ep-title">${escHtml(info.title)}</div>
            <div class="ep-date">${info.uploader}${info.duration ? ' · ' + fmtDuration(info.duration) : ''}</div>
          </div>
          <span class="transcript-badge">YT</span>
          <span class="ep-arrow">→</span>
        `;
        item.dataset.episodeUrl = input;
        item.addEventListener('click', () => analyzeEpisode(null, null, null, input, info.title, info.uploader));
        list.appendChild(item);
        updateAnalyzedBadges();
        showScreen('screen-episodes');

      } else {
        const res = await fetch(`${API_BASE()}/podcast?rss_url=${encodeURIComponent(input)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        currentPodcastTitle = data.podcast_title;
        currentEpisodes = data.episodes;

        saveToHistory(data.podcast_title, input);
        document.getElementById('podcast-title').textContent = data.podcast_title;
        document.getElementById('episode-count').textContent = data.episodes.length;

        const list = document.getElementById('episode-list');
        list.innerHTML = '';
        data.episodes.forEach((ep, i) => {
          const item = document.createElement('div');
          item.className = 'episode-item';
          const badge = ep.transcript_url ? `<span class="transcript-badge">字幕</span>` : '';
          item.innerHTML = `
            <span class="ep-num">${String(i + 1).padStart(2, '0')}</span>
            <div class="ep-info">
              <div class="ep-title">${escHtml(ep.title)}</div>
              <div class="ep-date">${ep.publish_time || '—'}</div>
            </div>
            ${badge}
            <span class="ep-arrow">→</span>
          `;
          item.dataset.episodeUrl = ep.mp3_url || '';
          item.addEventListener('click', () => analyzeEpisode(ep.mp3_url, ep.transcript_url, ep.transcript_type, null, ep.title, currentPodcastTitle));
          list.appendChild(item);
        });
        updateAnalyzedBadges();
        showScreen('screen-episodes');
      }
    } catch (e) {
      showToast('取得失敗：' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '取得節目列表';
    }
  });

  function fmtDuration(sec) {
    const m = Math.floor(sec / 60), s = sec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  // ── Analyze Episode via SSE ──
  function analyzeEpisode(mp3Url, transcriptUrl, transcriptType, youtubeUrl, episodeTitle, podcastTitle) {
    if (activeSource) { activeSource.close(); activeSource = null; }
    resetProgress();
    showScreen('screen-processing');

    currentEpisodeUrl = youtubeUrl || mp3Url || '';
    document.getElementById('chat-messages').innerHTML = '';

    const cached = getCachedResult(currentEpisodeUrl);
    if (cached) {
      renderSummary(cached);
      showScreen('screen-summary');
      return;
    }

    let url;
    if (youtubeUrl) {
      url = `${API_BASE()}/analyze/stream?youtube_url=${encodeURIComponent(youtubeUrl)}`;
    } else {
      url = `${API_BASE()}/analyze/stream?mp3_url=${encodeURIComponent(mp3Url)}`;
      if (transcriptUrl) {
        url += `&transcript_url=${encodeURIComponent(transcriptUrl)}`;
        if (transcriptType) url += `&transcript_type=${encodeURIComponent(transcriptType)}`;
      }
    }
    if (episodeTitle) url += `&episode_title=${encodeURIComponent(episodeTitle)}`;
    if (podcastTitle) url += `&podcast_title=${encodeURIComponent(podcastTitle)}`;
    const es = new EventSource(url);
    activeSource = es;
    let completed = false;

    es.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.step === 'error') {
        completed = true;
        es.close(); activeSource = null;
        showToast('分析失敗：' + data.error);
        showScreen('screen-episodes');
        return;
      }

      updateProgress(data);

      if (data.progress === 100) {
        completed = true;
        es.close(); activeSource = null;
        setCachedResult(currentEpisodeUrl, data.result);
        renderSummary(data.result);
        showScreen('screen-summary');
      }
    };

    es.onerror = () => {
      if (completed) return;
      es.close(); activeSource = null;
      showToast('連線中斷，請重試');
      showScreen('screen-episodes');
    };
  }

  // ── Render Summary ──
  function renderSummary(data) {
    const doneAnim = document.getElementById('done-anim');
    const doneCircle = document.getElementById('done-circle');

    doneAnim.style.transition = 'none';
    doneAnim.classList.remove('visible');

    const freshCircle = doneCircle.cloneNode(true);
    doneCircle.parentNode.replaceChild(freshCircle, doneCircle);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      doneAnim.style.transition = '';
      doneAnim.classList.add('visible');
      setTimeout(() => {
        doneAnim.classList.remove('visible');
      }, 2200);
    }));

    document.getElementById('summary-text').textContent = data.answer || '（無摘要）';

    const kpList = document.getElementById('keypoints-list');
    kpList.innerHTML = '';
    (data.key_points || []).forEach((kp, i) => {
      const item = document.createElement('div');
      item.className = 'keypoint-item';
      item.innerHTML = `
        <span class="kp-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="kp-text">${escHtml(kp)}</span>
      `;
      kpList.appendChild(item);
    });
  }

  // ── Cancel analysis ──
  document.getElementById('btn-cancel-analysis').addEventListener('click', () => {
    if (activeSource) { activeSource.close(); activeSource = null; }
    showScreen('screen-episodes');
  });

  // ── Chat ──
  async function sendChat() {
    const input = document.getElementById('chat-input');
    const question = input.value.trim();
    if (!question || !currentEpisodeUrl) return;

    const messages = document.getElementById('chat-messages');
    const sendBtn = document.getElementById('chat-send');

    const userBubble = document.createElement('div');
    userBubble.className = 'chat-bubble user';
    userBubble.textContent = question;
    messages.appendChild(userBubble);

    const loadingBubble = document.createElement('div');
    loadingBubble.className = 'chat-bubble ai loading';
    loadingBubble.textContent = '思考中';
    messages.appendChild(loadingBubble);
    messages.scrollTop = messages.scrollHeight;

    input.value = '';
    sendBtn.disabled = true;

    try {
      const res = await fetch(`${API_BASE()}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, episode_url: currentEpisodeUrl }),
      });
      const data = await res.json();
      loadingBubble.className = 'chat-bubble ai';
      loadingBubble.textContent = data.answer;
    } catch (e) {
      loadingBubble.className = 'chat-bubble ai';
      loadingBubble.textContent = '發生錯誤，請稍後再試。';
    } finally {
      sendBtn.disabled = false;
      messages.scrollTop = messages.scrollHeight;
    }
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChat();
  });

  // ── Search ──
  document.getElementById('btn-open-search').addEventListener('click', () => showScreen('screen-search'));
  document.getElementById('back-from-search').addEventListener('click', () => showScreen('screen-home'));

  document.getElementById('btn-search-exec').addEventListener('click', async () => {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;

    const btn = document.getElementById('btn-search-exec');
    const container = document.getElementById('search-results');
    btn.disabled = true;
    btn.textContent = '搜尋中...';
    container.innerHTML = '';

    try {
      const res = await fetch(`${API_BASE()}/search?query=${encodeURIComponent(query)}`);
      const results = await res.json();

      if (!results.length) {
        container.innerHTML = '<div class="no-results">沒有找到相關集數，試著分析幾集後再搜尋。</div>';
        return;
      }
      results.forEach(r => {
        const card = document.createElement('div');
        card.className = 'search-result';
        card.innerHTML = `
          <div class="search-result-title">${escHtml(r.episode_title)}</div>
          ${r.podcast_title ? `<div class="search-result-podcast">${escHtml(r.podcast_title)}</div>` : ''}
          <div class="search-result-excerpt">${escHtml(r.excerpt)}…</div>
        `;
        container.appendChild(card);
      });
    } catch (e) {
      container.innerHTML = '<div class="no-results">搜尋失敗，請確認後端連線正常。</div>';
    } finally {
      btn.disabled = false;
      btn.textContent = '搜尋';
    }
  });

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-search-exec').click();
  });

  // ── Navigation ──
  document.getElementById('back-from-episodes').addEventListener('click', () => showScreen('screen-home'));
  document.getElementById('back-from-summary').addEventListener('click', () => showScreen('screen-episodes'));
  document.getElementById('btn-analyze-another').addEventListener('click', () => showScreen('screen-episodes'));

  // ── Enter key on RSS input ──
  document.getElementById('rss-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-get-episodes').click();
  });

  // ── Mouse effects: orbs + cursor + trail + ripple ──
  (function () {
    const dot    = document.getElementById('cursor-dot');
    const ring   = document.getElementById('cursor-ring');
    const orb1   = document.querySelector('.orb-1');
    const orb2   = document.querySelector('.orb-2');
    const orb3   = document.querySelector('.orb-3');
    const canvas = document.getElementById('cursor-trail');
    const ctx    = canvas ? canvas.getContext('2d') : null;

    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let rx = mx, ry = my;
    let o1x = mx, o1y = my;
    let o2x = mx * .6, o2y = my * .6;
    let o3x = mx * 1.2, o3y = my * .8;

    const TRAIL = 28;
    const pts = Array.from({ length: TRAIL }, () => ({ x: mx, y: my }));

    function resizeCanvas() {
      if (!canvas) return;
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    document.addEventListener('mouseover', e => {
      const hit = e.target.closest('button, a, .episode-item, .history-item, .search-result, input, .nav-link');
      if (hit) {
        ring.classList.add('hover');
        dot.classList.add('hovering');
      } else {
        ring.classList.remove('hover');
        dot.classList.remove('hovering');
      }
    });

    document.addEventListener('mousedown', e => {
      dot.classList.add('clicking');
      const r1 = document.createElement('div');
      r1.className = 'cursor-ripple';
      r1.style.left = e.clientX + 'px';
      r1.style.top  = e.clientY + 'px';
      document.body.appendChild(r1);
      r1.addEventListener('animationend', () => r1.remove());

      const r2 = document.createElement('div');
      r2.className = 'cursor-ripple-2';
      r2.style.left = e.clientX + 'px';
      r2.style.top  = e.clientY + 'px';
      document.body.appendChild(r2);
      r2.addEventListener('animationend', () => r2.remove());
    });
    document.addEventListener('mouseup', () => dot.classList.remove('clicking'));

    function lerp(a, b, t) { return a + (b - a) * t; }

    function tick() {
      dot.style.left = mx + 'px';
      dot.style.top  = my + 'px';

      rx = lerp(rx, mx, .12);
      ry = lerp(ry, my, .12);
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';

      o1x = lerp(o1x, mx, .025);
      o1y = lerp(o1y, my, .025);
      orb1.style.transform = `translate(${o1x - 225}px,${o1y - 225}px)`;

      o2x = lerp(o2x, window.innerWidth - mx, .04);
      o2y = lerp(o2y, window.innerHeight - my, .04);
      orb2.style.transform = `translate(${o2x - 150}px,${o2y - 150}px)`;

      o3x = lerp(o3x, mx * .5 + window.innerWidth * .3, .018);
      o3y = lerp(o3y, my * .8, .018);
      orb3.style.transform = `translate(${o3x - 100}px,${o3y - 100}px)`;

      if (ctx) {
        pts.pop();
        pts.unshift({ x: mx, y: my });
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 1; i < TRAIL; i++) {
          const t = i / TRAIL;
          const alpha = (1 - t) * .3;
          const r = (1 - t) * 3;
          const p = pts[i];
          const pp = pts[i - 1];
          ctx.beginPath();
          ctx.moveTo(pp.x, pp.y);
          ctx.lineTo(p.x, p.y);
          ctx.strokeStyle = `rgba(163,230,53,${alpha})`;
          ctx.lineWidth = Math.max(r, .3);
          ctx.lineCap = 'round';
          ctx.stroke();
        }
      }

      requestAnimationFrame(tick);
    }
    tick();
  })();

  // ── Utils ──
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
